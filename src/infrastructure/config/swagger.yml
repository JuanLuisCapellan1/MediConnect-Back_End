components:
  schemas:
    Provincia:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Buenos Aires"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Municipio:
      type: object
      properties:
        id:
          type: integer
          example: 1
        provinciaId:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Santo Domingo"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    DistritoMunicipal:
      type: object
      properties:
        id:
          type: integer
          example: 1
        municipioId:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Distrito Central"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Seccion:
      type: object
      properties:
        id:
          type: integer
          example: 1
        distritoMunicipalId:
          type: integer
          nullable: true
          example: 1
          description: ID del distrito municipal (puede ser null)
        municipioId:
          type: integer
          nullable: true
          example: 1
          description: ID del municipio (puede ser null)
        nombre:
          type: string
          example: "Sección A"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Barrio:
      type: object
      properties:
        id:
          type: integer
          example: 1
        seccionId:
          type: integer
          example: 5
          description: ID de la sección a la que pertenece el barrio
        nombre:
          type: string
          example: "Los Prados"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    SubBarrio:
      type: object
      properties:
        id:
          type: integer
          example: 1
        barrioId:
          type: integer
          example: 3
          description: ID del barrio al que pertenece el SubBarrio
        nombre:
          type: string
          example: "Sub Barrio A"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Ubicacion:
      type: object
      properties:
        id:
          type: integer
          example: 1
        barrioId:
          type: integer
          example: 2
          description: ID del barrio al que pertenece la ubicación
        subBarrioId:
          type: integer
          nullable: true
          example: 1
          description: ID del subbarrio al que pertenece la ubicación (puede ser null)
        direccion:
          type: string
          example: "Calle Principal 123"
          description: Dirección de la ubicación
        codigoPostal:
          type: string
          nullable: true
          example: "28001"
          description: Código postal (puede ser null)
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        puntoGeografico:
          type: string
          nullable: true
          example: '{"type": "Point", "coordinates": [-70.1234, 18.5678]}'
          description: Coordenadas geográficas en formato GeoJSON Point (opcional). Formato - latitude entre -90 y 90, longitude entre -180 y 180.
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Horario:
      type: object
      properties:
        id:
          type: integer
          example: 1
        doctorId:
          type: integer
          example: 5
          description: ID del doctor que tiene este horario
        nombre:
          type: string
          example: "Bloque Matutino"
          description: Nombre descriptivo del bloque horario
        diaSemana:
          type: integer
          enum: [0, 1, 2, 3, 4, 5, 6]
          example: 1
          description: Día de la semana (0=Domingo, 1=Lunes, ..., 6=Sábado)
        horaInicio:
          type: string
          format: date-time
          example: "2025-01-22T08:00:00Z"
          description: Hora de inicio del horario en formato ISO 8601
        horaFin:
          type: string
          format: date-time
          example: "2025-01-22T12:00:00Z"
          description: Hora de fin del horario en formato ISO 8601
        ubicacionId:
          type: integer
          example: 2
          description: ID de la ubicación donde se atiende
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    ServicioHorario:
      type: object
      description: Relación entre un servicio médico y un horario disponible con datos relacionados
      properties:
        servicioId:
          type: integer
          example: 1
          description: ID del servicio médico
        horarioId:
          type: integer
          example: 1
          description: ID del horario
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
          description: Estado de la relación (si está disponible o no)
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"
        servicio:
          type: object
          nullable: true
          description: Datos del servicio relacionado
          properties:
            id:
              type: integer
              example: 1
            nombre:
              type: string
              example: "Consulta General"
            descripcion:
              type: string
              example: "Consulta médica general"
            estado:
              type: string
              example: "Activo"
        horario:
          type: object
          nullable: true
          description: Datos del horario relacionado
          properties:
            id:
              type: integer
              example: 1
            nombre:
              type: string
              example: "Turno Mañana"
            diaSemana:
              type: integer
              example: 1
              description: "Día de la semana (0=Domingo, 1=Lunes, ..., 6=Sábado)"
            horaInicio:
              type: string
              example: "08:00:00"
            horaFin:
              type: string
              example: "12:00:00"
            estado:
              type: string
              example: "Activo"
          description: Fecha y hora de creación de la relación

    TipoServicio:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Consulta Médica"
        descripcion:
          type: string
          nullable: true
          example: "Servicio de consulta general"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-02-02T12:00:00Z"

    TipoCentroSalud:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Hospital"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
