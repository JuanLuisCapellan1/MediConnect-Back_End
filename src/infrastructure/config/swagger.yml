            example: 1
          description: ID del distrito municipal a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                municipioId:
                  type: integer
                  example: 1
                  description: ID del municipio (opcional)
                nombre:
                  type: string
                  minLength: 3
                  example: "Distrito Central Actualizado"
                  description: Nuevo nombre del distrito (opcional)
                estado:
                  type: string
                  enum: ["Activo", "Inactivo", "Eliminado"]
