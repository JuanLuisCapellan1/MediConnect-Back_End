  /servicios-horarios/{servicioId}/{horarioId}:
    get:
      summary: Obtener una relación ServicioHorario específica
      tags:
        - ServiciosHorarios
      description: Obtiene los detalles de una relación específica entre un servicio y un horario.
      parameters:
        - name: servicioId
          in: path
          required: true
          schema:
            type: integer
          description: ID del servicio
        - name: horarioId
          in: path
          required: true
          schema:
            type: integer
          description: ID del horario
      responses:
        '200':
          description: Relación ServicioHorario obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  datos:
                    $ref: '#/components/schemas/ServicioHorario'
        '400':
          description: IDs inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Relación ServicioHorario no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

    put:
      summary: Actualizar una relación ServicioHorario
      tags:
        - ServiciosHorarios
      description: Actualiza una relación ServicioHorario existente. Puede cambiar la combinación de IDs (servicioId y/o horarioId) o solo el estado. Si se cambia la combinación de IDs, se valida que la nueva combinación no exista y que los nuevos servicio y horario existan en la base de datos.
      parameters:
        - name: servicioId
          in: path
          required: true
          schema:
            type: integer
          description: ID del servicio actual (el que se va a reemplazar)
        - name: horarioId
          in: path
          required: true
          schema:
            type: integer
          description: ID del horario actual (el que se va a reemplazar)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                servicioId:
                  type: integer
                  example: 2
                  description: Nuevo ID del servicio (opcional). Si se proporciona, reemplaza el servicioId actual.
                horarioId:
                  type: integer
                  example: 5
                  description: Nuevo ID del horario (opcional). Si se proporciona, reemplaza el horarioId actual.
                estado:
                  type: string
                  enum: ["Activo", "Inactivo"]
                  example: "Inactivo"
                  description: Nuevo estado de la relación (opcional)
      responses:
        '200':
          description: Relación ServicioHorario actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: "ServicioHorario actualizado exitosamente"
                  datos:
                    $ref: '#/components/schemas/ServicioHorario'
        '400':
          description: Datos inválidos (IDs fuera de rango, estado inválido, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Relación ServicioHorario no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflicto - La nueva combinación de servicioId/horarioId ya existe (violación de PRIMARY KEY)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

    delete:
      summary: Eliminar una relación ServicioHorario
      tags:
        - ServiciosHorarios
      description: Elimina una relación ServicioHorario, removiendo la disponibilidad de ese servicio en ese horario.
      parameters:
        - name: servicioId
          in: path
          required: true
          schema:
            type: integer
          description: ID del servicio
        - name: horarioId
          in: path
          required: true
          schema:
            type: integer
          description: ID del horario
      responses:
        '200':
          description: Relación ServicioHorario eliminada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: "ServicioHorario eliminado exitosamente"
        '400':
          description: IDs inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Relación ServicioHorario no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

