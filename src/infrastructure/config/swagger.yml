                fechaFinalizacion:
                  type: string
                  format: date
                  example: "2024-01-15"
                  description: Fecha de finalización
                trabajaActualmente:
                  type: boolean
                  example: false
                  description: Indica si trabaja actualmente en este puesto
                estado:
                  type: string
                  enum: ["Activo", "Inactivo"]
