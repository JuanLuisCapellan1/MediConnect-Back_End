                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Barrio'
                  count:
                    type: integer
                    example: 45
                  message:
                    type: string
                    example: Barrios obtenidos exitosamente
        '400':
          description: Estado inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

  /subBarrios:
    post:
      summary: Crear un nuevo SubBarrio
      tags:
        - SubBarrios
      description: Crea un nuevo SubBarrio en un barrio específico. El nombre debe ser único dentro del barrio.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - barrioId
                - nombre
              properties:
                barrioId:
                  type: integer
                  example: 3
                  description: ID del barrio al que pertenecerá el SubBarrio
                nombre:
                  type: string
                  example: "Sub Barrio A"
                  description: Nombre del SubBarrio (máximo 80 caracteres)
      responses:
        '201':
          description: SubBarrio creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubBarrio'
        '400':
          description: Datos inválidos o barrioId inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: El nombre del SubBarrio ya existe en el barrio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

    get:
      summary: Listar todos los SubBarrios
      tags:
        - SubBarrios
      description: Obtiene una lista de todos los SubBarrios no eliminados.
      responses:
        '200':
          description: SubBarrios obtenidos exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubBarrio'
        '500':
          description: Error interno del servidor

  /subBarrios/{id}:
    get:
      summary: Obtener un SubBarrio por ID
      tags:
        - SubBarrios
      description: Obtiene un SubBarrio específico por su ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
          description: ID del SubBarrio
      responses:
        '200':
          description: SubBarrio obtenido exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubBarrio'
        '400':
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: SubBarrio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

    put:
      summary: Actualizar un SubBarrio
      tags:
        - SubBarrios
      description: Actualiza un SubBarrio existente. Al menos uno de los campos opcionales debe ser proporcionado.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
          description: ID del SubBarrio a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                barrioId:
                  type: integer
                  example: 5
                  description: Nuevo ID de barrio (opcional)
                nombre:
                  type: string
                  example: "Sub Barrio B"
                  description: Nuevo nombre (opcional)
                estado:
                  type: string
                  enum: ["Activo", "Inactivo", "Eliminado"]
                  example: "Activo"
                  description: Nuevo estado (opcional)
              description: Al menos uno de los campos (barrioId, nombre o estado) debe ser proporcionado
      responses:
        '200':
          description: SubBarrio actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubBarrio'
        '400':
          description: Datos inválidos o campos insuficientes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: SubBarrio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: El nombre del SubBarrio ya existe en el nuevo barrio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

    delete:
      summary: Eliminar un SubBarrio
      tags:
        - SubBarrios
      description: Elimina (soft delete) un SubBarrio, marcándolo como eliminado. No se puede eliminar si tiene ubicaciones asociadas.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
          description: ID del SubBarrio a eliminar
      responses:
        '200':
          description: SubBarrio eliminado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubBarrio'
        '400':
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: SubBarrio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor o el SubBarrio tiene dependencias

  /subBarrios/barrio/{barrioId}:
    get:
      summary: Listar SubBarrios de un barrio
      tags:
        - SubBarrios
      description: Obtiene todos los SubBarrios que pertenecen a un barrio específico.
      parameters:
        - name: barrioId
          in: path
          required: true
          schema:
            type: integer
            example: 3
          description: ID del barrio
      responses:
        '200':
          description: SubBarrios del barrio obtenidos exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubBarrio'
        '400':
          description: ID de barrio inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

  /subBarrios/nombre/{nombre}/{estado}:
    get:
      summary: Buscar SubBarrios por nombre y estado
      tags:
        - SubBarrios
      description: Busca SubBarrios por nombre (búsqueda parcial) y opcionalmente filtra por estado.
      parameters:
        - name: nombre
          in: path
          required: true
          schema:
            type: string
            example: "Sub"
          description: Nombre del SubBarrio a buscar (búsqueda parcial)
        - name: estado
          in: path
          required: true
          schema:
            type: string
            enum: ["Activo", "Inactivo", "Eliminado", "Todos"]
            example: "Activo"
          description: Estado de los SubBarrios a buscar (use "Todos" para obtener todos los estados)
      responses:
        '200':
          description: SubBarrios encontrados exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubBarrio'
        '400':
          description: Parámetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

  /subBarrios/estado/{estado}:
    get:
      summary: Listar SubBarrios por estado
      tags:
        - SubBarrios
      description: Obtiene todos los SubBarrios que tienen un estado específico.
      parameters:
        - name: estado
          in: path
          required: true
          schema:
            type: string
            enum: ["Activo", "Inactivo", "Eliminado"]
            example: "Activo"
          description: Estado de los SubBarrios a buscar
      responses:
        '200':
          description: SubBarrios obtenidos exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubBarrio'
        '400':
          description: Estado inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
components:
  schemas:
    Provincia:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Buenos Aires"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Municipio:
      type: object
      properties:
        id:
          type: integer
          example: 1
        provinciaId:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Santo Domingo"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    DistritoMunicipal:
      type: object
      properties:
        id:
          type: integer
          example: 1
        municipioId:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Distrito Central"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Seccion:
      type: object
      properties:
        id:
          type: integer
          example: 1
        distritoMunicipalId:
          type: integer
          nullable: true
          example: 1
          description: ID del distrito municipal (puede ser null)
        municipioId:
          type: integer
          nullable: true
          example: 1
          description: ID del municipio (puede ser null)
        nombre:
          type: string
          example: "Sección A"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Barrio:
      type: object
      properties:
        id:
          type: integer
          example: 1
        seccionId:
          type: integer
          example: 5
          description: ID de la sección a la que pertenece el barrio
        nombre:
          type: string
          example: "Los Prados"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    SubBarrio:
      type: object
      properties:
        id:
          type: integer
          example: 1
        barrioId:
          type: integer
          example: 3
          description: ID del barrio al que pertenece el SubBarrio
        nombre:
          type: string
          example: "Sub Barrio A"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Error al procesar la solicitud"