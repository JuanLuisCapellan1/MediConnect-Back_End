                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Actualizar una experiencia laboral
      tags:
        - ExperienciasLaborales
      description: Actualiza una experiencia laboral existente. Todos los campos son opcionales, pero al menos uno debe ser proporcionado. Se mantienen las validaciones de negocio (fechas coherentes, institución válida, etc.).
      parameters:
        - name: id
          in: path
