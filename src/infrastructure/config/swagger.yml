                  example: "Activo"
                  description: Nuevo estado del distrito (opcional)
              description: Al menos uno de los campos (municipioId, nombre o estado) debe ser proporcionado
      responses:
        '200':
          description: Distrito municipal actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
