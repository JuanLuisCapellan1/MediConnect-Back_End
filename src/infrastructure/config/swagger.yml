  # --- SERVICIOS HORARIOS ENDPOINTS ---
  /servicios-horarios:
    post:
      summary: Crear una nueva relación ServicioHorario
      tags:
        - ServiciosHorarios
      description: Crea una nueva relación entre un servicio y un horario. Especifica que un servicio está disponible en un horario determinado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - servicioId
                - horarioId
              properties:
                servicioId:
                  type: integer
                  example: 1
                  description: ID del servicio
                horarioId:
                  type: integer
                  example: 1
                  description: ID del horario
                estado:
                  type: string
                  enum: ["Activo", "Inactivo"]
                  example: "Activo"
                  description: Estado de la relación (opcional, por defecto Activo)
      responses:
        '201':
          description: Relación ServicioHorario creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: "ServicioHorario creado exitosamente"
                  datos:
                    $ref: '#/components/schemas/ServicioHorario'
        '400':
          description: Datos inválidos o servicio/horario no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: La relación ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

    get:
      summary: Listar todas las relaciones ServicioHorario
      tags:
        - ServiciosHorarios
      description: Obtiene una lista de todas las relaciones ServicioHorario con soporte para paginación y filtros.
      parameters:
        - name: servicioId
          in: query
          schema:
            type: integer
          description: Filtrar por ID del servicio (opcional)
        - name: horarioId
          in: query
          schema:
            type: integer
          description: Filtrar por ID del horario (opcional)
        - name: estado
          in: query
          schema:
            type: string
            enum: ["Activo", "Inactivo"]
          description: Filtrar por estado (opcional)
        - name: pagina
          in: query
          schema:
            type: integer
            example: 1
          description: Número de página (por defecto 1)
        - name: limite
          in: query
          schema:
            type: integer
            example: 10
          description: Registros por página (por defecto 10, máximo 100)
      responses:
        '200':
          description: Relaciones ServicioHorario obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  datos:
