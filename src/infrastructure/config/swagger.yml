  # --- EXPERIENCIAS LABORALES ENDPOINTS ---
  /experiencias-laborales:
    post:
      summary: Crear una nueva experiencia laboral
      tags:
        - ExperienciasLaborales
      description: Crea una nueva experiencia laboral para un doctor. Debe especificar un centro de salud o una institución externa, pero no ambos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - doctorId
                - profesionId
                - descripcionCargo
                - fechaInicio
              properties:
                doctorId:
                  type: integer
                  example: 1
                  description: ID del doctor
                centroSaludId:
                  type: integer
                  example: 5
                  description: ID del centro de salud (opcional si se especifica institucionExterna)
                institucionExterna:
                  type: string
                  example: "Hospital General Regional"
                  maxLength: 150
                  description: Nombre de la institución externa (opcional si se especifica centroSaludId)
                profesionId:
                  type: integer
                  example: 2
                  description: ID de la profesión
                descripcionCargo:
                  type: string
                  example: "Médico General en el área de emergencias"
                  minLength: 5
                  maxLength: 200
                  description: Descripción del cargo desempeñado
                fechaInicio:
                  type: string
                  format: date
                  example: "2020-01-15"
                  description: Fecha de inicio (ISO 8601, no puede ser futura)
                fechaFinalizacion:
                  type: string
                  format: date
                  example: "2023-06-30"
                  description: Fecha de finalización (ISO 8601, requerida si trabajaActualmente es false)
                trabajaActualmente:
                  type: boolean
                  example: false
                  default: false
                  description: Indica si el doctor trabaja actualmente en este puesto
                estado:
                  type: string
                  enum: ["Activo", "Inactivo"]
                  example: "Activo"
                  default: "Activo"
                  description: Estado de la experiencia laboral
      responses:
        '201':
          description: Experiencia laboral creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Experiencia laboral creada exitosamente"
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ExperienciaLaboral'
        '400':
          description: Datos inválidos (fechas inválidas, institución requerida, campos faltantes, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Doctor, profesión o centro de salud no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Obtener todas las experiencias laborales
      tags:
        - ExperienciasLaborales
      description: Lista todas las experiencias laborales con soporte para filtros y paginación. Los resultados se ordenan por trabajos actuales primero y luego por fecha de inicio descendente.
      parameters:
        - name: doctorId
          in: query
          schema:
            type: integer
          description: Filtrar por ID del doctor
        - name: centroSaludId
          in: query
          schema:
            type: integer
          description: Filtrar por ID del centro de salud
        - name: profesionId
          in: query
          schema:
            type: integer
          description: Filtrar por ID de la profesión
        - name: trabajaActualmente
          in: query
          schema:
            type: boolean
          description: Filtrar por trabajos actuales (true/false)
        - name: estado
          in: query
          schema:
            type: string
            enum: ["Activo", "Inactivo", "Eliminado"]
          description: Filtrar por estado
        - name: busqueda
          in: query
          schema:
            type: string
          description: Buscar en descripción del cargo e institución externa
        - name: pagina
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Número de página
        - name: limite
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Cantidad de resultados por página
      responses:
        '200':
          description: Lista de experiencias laborales
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Experiencias laborales obtenidas exitosamente"
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      experiencias:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExperienciaLaboral'
                      total:
                        type: integer
                        example: 25
        '400':
          description: Parámetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

