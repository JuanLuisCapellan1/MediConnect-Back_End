        '201':
          description: Municipio creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Municipio'
                  message:
                    type: string
                    example: Municipio creado exitosamente
        '400':
          description: Datos inválidos o provincia no existe
